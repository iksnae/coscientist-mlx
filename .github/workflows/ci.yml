name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    name: Build & test (macOS, Swift 6)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Swift version
        run: swift --version   # macos-15 default toolchain is Swift 6.x
      - name: Build
        run: swift build
      - name: Test
        run: swift test
