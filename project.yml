# xcodegen spec for the demo apps. Generate with:
#   xcodegen generate
# (The CoScientist.xcodeproj is gitignored; this spec is the source of truth — re-run
#  `xcodegen generate` after pulling if targets/sources look stale.)
#   CoScientistApp   — iOS validation app   (Apps/iOS)
#   CoScientistDemo  — macOS playground     (Apps/macOS)
name: CoScientist
options:
  bundleIdPrefix: com.iksnae
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    # Real team signing (Khaos team, paid) so the apps can use the iCloud/CloudKit entitlement
    # for cross-device study sync (M17). Automatic signing creates/uses the development cert +
    # provisioning profile (incl. the iCloud container) for this team.
    DEVELOPMENT_TEAM: "G98TZJ75HL"
    CODE_SIGN_STYLE: Automatic
    # App icon from the shared asset catalog (Apps/Shared/Assets.xcassets/AppIcon).
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"
packages:
  coscientist-mlx:
    path: .
  Grape:
    url: https://github.com/swiftgraphs/Grape
    from: "1.1.0"
targets:
  CoScientistApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    # Shared scheme so Xcode Cloud (which regenerates this gitignored project via
    # ci_post_clone) has a scheme to build. Without this, xcodegen emits no shared scheme.
    scheme:
      testTargets: []
    sources:
      - Apps/Shared
      - Apps/iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iksnae.coscientist.app
        CODE_SIGN_ENTITLEMENTS: Apps/iOS/CoScientistApp.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: CoScientist
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        # Background mode so SwiftData+CloudKit can apply remote changes via silent pushes.
        INFOPLIST_KEY_UIBackgroundModes: remote-notification
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: coscientist-mlx
        product: AICoScientistKit
      - package: coscientist-mlx
        product: AICoScientistMLX
      - package: coscientist-mlx
        product: AICoScientistRemote
      - package: coscientist-mlx
        product: AICoScientistFoundationModels
      - package: Grape
        product: Grape

  CoScientistDemo:
    # macOS playground; depends on Remote too for the in-app hybrid judge.
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    # Shared scheme for Xcode Cloud (see CoScientistApp note).
    scheme:
      testTargets: []
    sources:
      - Apps/Shared
      - Apps/macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iksnae.coscientist.demo
        CODE_SIGN_ENTITLEMENTS: Apps/macOS/CoScientistDemo.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: CoScientist
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        # Not sandboxed, so it can reach Hugging Face and use the on-disk model cache.
        ENABLE_APP_SANDBOX: NO
        # Real team signing (inherits base DEVELOPMENT_TEAM + Automatic) for the iCloud/CloudKit
        # entitlement. Was ad-hoc ("-"); CloudKit needs a provisioned identity, so the demo now
        # signs with the development team like the iOS app.
    dependencies:
      - package: coscientist-mlx
        product: AICoScientistKit
      - package: coscientist-mlx
        product: AICoScientistMLX
      - package: coscientist-mlx
        product: AICoScientistRemote
      - package: coscientist-mlx
        product: AICoScientistFoundationModels
      - package: Grape
        product: Grape
