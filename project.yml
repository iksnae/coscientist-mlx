# xcodegen spec for the iOS validation app. Generate with:
#   xcodegen generate
# (The .xcodeproj is gitignored; this spec is the source of truth.)
name: CoScientistApp
options:
  bundleIdPrefix: studio.khaos.coscientist
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: "53J75BLCPY"
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"
packages:
  coscientist-mlx:
    path: .
targets:
  CoScientistApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - ios/App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: studio.khaos.coscientist.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: CoScientist
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: coscientist-mlx
        product: AICoScientistKit
      - package: coscientist-mlx
        product: AICoScientistMLX
