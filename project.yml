# xcodegen spec for the demo apps. Generate with:
#   xcodegen generate
# (The CoScientist.xcodeproj is gitignored; this spec is the source of truth — re-run
#  `xcodegen generate` after pulling if targets/sources look stale.)
#   CoScientistApp   — iOS validation app   (Apps/iOS)
#   CoScientistDemo  — macOS playground     (Apps/macOS)
name: CoScientist
options:
  bundleIdPrefix: com.iksnae
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: "53J75BLCPY"
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"
packages:
  coscientist-mlx:
    path: .
  Grape:
    url: https://github.com/swiftgraphs/Grape
    from: "1.1.0"
targets:
  CoScientistApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Apps/iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iksnae.coscientist.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: CoScientist
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: coscientist-mlx
        product: AICoScientistKit
      - package: coscientist-mlx
        product: AICoScientistMLX

  CoScientistDemo:
    # macOS playground; depends on Remote too for the in-app hybrid judge.
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Apps/macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iksnae.coscientist.demo
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: CoScientist
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        # Local demo: not sandboxed, so it can reach Hugging Face and use the model cache.
        ENABLE_APP_SANDBOX: NO
        # Ad-hoc signing — builds/runs locally without a Mac Development certificate.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: coscientist-mlx
        product: AICoScientistKit
      - package: coscientist-mlx
        product: AICoScientistMLX
      - package: coscientist-mlx
        product: AICoScientistRemote
      - package: coscientist-mlx
        product: AICoScientistFoundationModels
      - package: Grape
        product: Grape
